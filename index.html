<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>KYC AI Copilot</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      box-sizing: border-box;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      font-size: 16px;
      cursor: pointer;
    }

    #result {
      margin-top: 20px;
      background: #eef3ff;
      padding: 15px;
      border-radius: 8px;
      white-space: pre-line;
    }
  </style>
</head>
<body>
  <h1>KYC AI Copilot</h1>

  <div class="card">
    <label>Company Name</label>
    <input id="companyName" placeholder="Example: Oracle Corporation">

    <label>Country</label>
    <input id="country" placeholder="Example: United States">

    <label>Industry</label>
    <input id="industry" placeholder="Example: Technology">

    <label>Is the customer a PEP?</label>
    <select id="pep">
      <option value="No">No</option>
      <option value="Yes">Yes</option>
    </select>

    <label>Any sanctions or watchlist concern?</label>
    <select id="sanctions">
      <option value="No">No</option>
      <option value="Yes">Yes</option>
    </select>

    <button onclick="generateSummary()">Generate KYC Summary</button>

    <div id="result"></div>
  </div>

  <script>
    function generateSummary() {
      const companyName = document.getElementById("companyName").value;
      const country = document.getElementById("country").value;
      const industry = document.getElementById("industry").value;
      const pep = document.getElementById("pep").value;
      const sanctions = document.getElementById("sanctions").value;

      let riskLevel = "Low";

      if (pep === "Yes" || sanctions === "Yes") {
        riskLevel = "High";
      } else if (country.toLowerCase() !== "united states" && country.trim() !== "") {
        riskLevel = "Medium";
      }

      const summary =
        "KYC Summary\n\n" +
        "Company: " + companyName + "\n" +
        "Country: " + country + "\n" +
        "Industry: " + industry + "\n" +
        "PEP: " + pep + "\n" +
        "Sanctions / Watchlist Concern: " + sanctions + "\n\n" +
        "Preliminary Risk Rating: " + riskLevel + "\n\n" +
        "Review Notes:\n" +
        "- Verify company registration documents.\n" +
        "- Confirm beneficial ownership information.\n" +
        "- Check OFAC, sanctions, and adverse media screening.\n" +
        "- Escalate to compliance officer if risk rating is High.";

      document.getElementById("result").innerText = summary;
    }
  </script>
</body>
</html>
